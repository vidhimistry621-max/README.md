<!DOCTYPE html>
<html>
<head>
    <title>Card Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">My Cards</h1>

    <div class="container">

        <div class="card">
            <h2>Card 1</h2>
            <p>First card</p>
        </div>

        <div class="card">
            <h2>Card 2</h2>
            <p>Second card</p>
        </div>

        <div class="card">
            <h2>Card 3</h2>
            <p>Third card</p>
        </div>

        <div class="card">
            <h2>Card 4</h2>
            <p>Fourth card</p>
        </div>
         </div>
    <h1 class="grid-title">4x4 Grid Layout</h1>

<div class="grid-container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>

    <div class="box">5</div>
    <div class="box">6</div>
    <div class="box">7</div>
    <div class="box">8</div>

    <div class="box">9</div>
    <div class="box">10</div>
    <div class="box">11</div>
    <div class="box">12</div>

    <div class="box">13</div>
    <div class="box">14</div>
    <div class="box">15</div>
    <div class="box">16</div>
</div>

</div>

  

</body>
</html>
