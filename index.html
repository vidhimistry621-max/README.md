<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Login Form</h1>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

            <label class="checkbox">
                <input
                    type="checkbox"
                    id="showPassword"
                >
                Show Password
            </label>

            <button type="submit">
                Login
            </button>

        </form>

        <p id="message"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
