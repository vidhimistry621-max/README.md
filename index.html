<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Card Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🧠 Memory Card Game</h1>

    <div class="info">
        <h3>Moves: <span id="moves">0</span></h3>
        <h3>Matched Pairs: <span id="matched">0</span></h3>
        <h3>Time: <span id="timer">0</span>s</h3>
    </div>

    <div class="records">
        <h3>Best Score: <span id="bestScore">0</span></h3>
        <h3>Least Moves: <span id="leastMoves">0</span></h3>
        <h3>Total Wins: <span id="wins">0</span></h3>
        <h3>Best Time: <span id="bestTime">0</span>s</h3>
    </div>

    <button id="resetBtn">Reset Game</button>

    <div class="game-board" id="gameBoard"></div>

    <h2 id="message"></h2>

    <script src="script.js"></script>

</body>
</html>
